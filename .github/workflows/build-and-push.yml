name: Build & Push Base Image

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Base Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure insecure registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries": ["${{ secrets.OPENSHIFT_REGISTRY }}"]}' \
            | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Log in to OpenShift Registry
        run: |
          echo "${{ secrets.OPENSHIFT_TOKEN }}" | docker login \
            ${{ secrets.OPENSHIFT_REGISTRY }} \
            --username unused \
            --password-stdin

      - name: Build and Push base image
        run: |
          docker build \
            -t ${{ secrets.OPENSHIFT_REGISTRY }}/default/base-nginx-otel:latest \
            -t ${{ secrets.OPENSHIFT_REGISTRY }}/default/base-nginx-otel:${{ github.sha }} .
          docker push ${{ secrets.OPENSHIFT_REGISTRY }}/default/base-nginx-otel:latest
          docker push ${{ secrets.OPENSHIFT_REGISTRY }}/default/base-nginx-otel:${{ github.sha }}
